<!DOCTYPE html>
<html>
<head>
    <title>SNMC Check-In System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>

        body{
            margin:0;
            padding:0;
            overflow-x:hidden;
            font-family:Arial, sans-serif;
        }

        /* VIDEO BACKGROUND */
        .bg-video{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-2;
        }

        /* DARK OVERLAY */
        .video-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.55);
            z-index:-1;
        }

        /* MAIN CARD */
        .checkin-card{
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(10px);
            border-radius:20px;
            border:none;
        }

        .title{
            color:#006b3f;
            font-weight:bold;
        }

        #reader{
            width:100%;
        }

        .container{
            position:relative;
            z-index:10;
        }

    </style>

</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline class="bg-video">
    <source src="snmmc2026.mp4" type="video/mp4">
</video>

<!-- DARK OVERLAY -->
<div class="video-overlay"></div>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card checkin-card shadow p-4">

                <h3 class="text-center title">
                    SNMMC Conference Check-In
                </h3>

                <hr>

                <!-- MODE SELECT -->
                <div class="btn-group w-100 mb-3">

                    <button
                        class="btn btn-primary"
                        onclick="showManual()">
                        Type Code
                    </button>

                    <button
                        class="btn btn-success"
                        onclick="showScanner()">
                        Scan QR
                    </button>

                </div>

                <!-- MANUAL INPUT -->
                <div id="manualSection">

                    <input
                        id="code"
                        class="form-control"
                        placeholder="Enter Registration Code">

                    <button
                        onclick="checkInManual()"
                        class="btn btn-primary w-100 mt-2">

                        Check In

                    </button>

                </div>

                <!-- QR SCANNER -->
                <div
                    id="scannerSection"
                    style="display:none;">

                    <div id="reader"></div>

                </div>

                <!-- RESULT -->
                <div id="result" class="mt-3"></div>

            </div>

        </div>

    </div>

</div>

<script>

const BASE_URL =
"https://script.google.com/macros/s/AKfycbyQkEjH_jSpz4L5TemlP9q6y90lacRwDn66EPtSWWKcx5RaFEsHCyYdNwzPv816MHD3/exec";

/* --------------------
   MODE SWITCH
-------------------- */

function showManual(){

    document.getElementById("manualSection")
        .style.display = "block";

    document.getElementById("scannerSection")
        .style.display = "none";
}

function showScanner(){

    document.getElementById("manualSection")
        .style.display = "none";

    document.getElementById("scannerSection")
        .style.display = "block";

    startScanner();
}

/* --------------------
   MANUAL CHECKIN
-------------------- */

function checkInManual(){

    let code =
        document.getElementById("code")
        .value
        .trim();

    if(!code){
        alert("Enter Registration Code");
        return;
    }

    processCheckIn(code);
}

/* --------------------
   QR SCANNER
-------------------- */

let scannerStarted = false;

function startScanner(){

    if(scannerStarted) return;

    const html5QrCode =
        new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
    .then(devices => {

        if(devices.length){

            html5QrCode.start(

                { facingMode: "environment" },

                {
                    fps:10,
                    qrbox:250
                },

                (decodedText)=>{

                    processCheckIn(decodedText);

                }
            );

            scannerStarted = true;
        }

    });
}

/* --------------------
   PROCESS CHECKIN
-------------------- */

async function processCheckIn(code){

    try{

        const response =
            await fetch(
                BASE_URL +
                "?code=" +
                encodeURIComponent(code)
            );

        const data =
            await response.json();

        if(data.status === "success"){

            document.getElementById("result")
            .innerHTML = `

            <div class="alert alert-success">

                <h4>✔ Checked In</h4>

                <hr>

                

               <p><b>Code:</b> ${data.regCode}</p> 
               <p><b>Code:</b> ${data.status}</p> 
               <p><b>Status:</b> Success</p>

            </div>
            `;
        }

        else if(data.status === "already"){

            document.getElementById("result")
            .innerHTML = `

            <div class="alert alert-warning">

                <h5>
                    ⚠ Already Checked In
                </h5>

            </div>
            `;
        }

        else{

            document.getElementById("result")
            .innerHTML = `

            <div class="alert alert-danger">

                <h5>
                    ❌ Invalid Code
                </h5>

            </div>
            `;
        }

    }
    catch(err){

        document.getElementById("result")
        .innerHTML = `

        <div class="alert alert-danger">

            <h5>
                ⚠ Network Error
            </h5>

        </div>
        `;
    }
}

</script>

</body>
</html>
