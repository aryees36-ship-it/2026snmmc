<!DOCTYPE html>
<html>
<head>
    <title>SNMMC Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card p-4 shadow">

        <h3 class="text-center mb-4">
            SNMM Conference Registration
        </h3>

        <form id="registrationForm">

            <!-- PERSONAL INFO -->
            <input class="form-control mb-2" id="name" placeholder="Full Name" required>
            <input class="form-control mb-2" id="staffId" placeholder="Staff ID" required>
            <input class="form-control mb-2" id="position" placeholder="Position" required>

            <select class="form-control mb-2" id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <select class="form-control mb-2" id="rank" required>
                <option value="">Select Rank</option>
                <option>SEN</option>
                <option>SCHN</option>
                <option>SSN</option>
                <option>SSM</option>
                <option>NO</option>
                <option>MO</option>
                <option>SNO</option>
                <option>SMO</option>
                <option>PNO</option>
                <option>PMO</option>
                <option>DCNO</option>
                <option>DCMO</option>
                <option>CNO</option>
                <option>CNMO</option>
                <option>N/M Specialist</option>
            </select>

            <!-- REGION -->
            <select class="form-control mb-2" id="region" required>
                <option value="">Select Region</option>
                <option>Ahafo – Goaso</option>
                <option>Ashanti – Kumasi</option>
                <option>Bono – Sunyani</option>
                <option>Bono East – Techiman</option>
                <option>Central – Cape Coast</option>
                <option>Eastern – Koforidua</option>
                <option>Greater Accra – Accra</option>
                <option>Northern – Tamale</option>
                <option>North East – Nalerigu</option>
                <option>Oti – Dambai</option>
                <option>Savannah – Damongo</option>
                <option>Upper East – Bolgatanga</option>
                <option>Upper West – Wa</option>
                <option>Volta – Ho</option>
                <option>Western – Sekondi-Takoradi</option>
                <option>Western North – Sefwi Wiawso</option>
            </select>

            <select class="form-control mb-2" id="district" required>
                <option value="">Select District</option>
            </select>

            <input class="form-control mb-2" id="facility" placeholder="Facility Name" required>

            <!-- CONTACT -->
            <input class="form-control mb-2" id="phone" placeholder="Phone Number" required>
            <input class="form-control mb-2" id="email" type="email" placeholder="Email Address" required>
            <input class="form-control mb-2" id="emergencyContact" placeholder="Emergency Contact"required>

            <!-- OTHER INFO -->
            <select class="form-control mb-2" id="agency" required>
                <option value="">Select Agency</option>
                <option>GHS</option>
                <option>CHAG</option>
                <option>Health Training Institution</option>
                <option>Quasi Government</option>
                <option>Others</option>
            </select>

            <input 
                class="form-control mb-2" 
                id="otherAgency" 
                placeholder="Please specify your agency"
                style="display:none;"
            >

            <select class="form-control mb-2" id="participation" required>
                <option value="">Participation Type</option>
                <option>Residential</option>
                <option>Non-residential</option>
            </select>

            <select class="form-control mb-2" id="tshirtColor" required>
                <option value="">T-shirt Colour</option>
                <option>Sacramento Green</option>
                <option>White</option>
                <option>Navy Blue</option>
                <option>Turquoise Blue</option>
                <option>Burgundy</option>
            </select>

            <select class="form-control mb-2" id="tshirtSize" required>
                <option value="">T-shirt Size</option>
                <option>Small</option>
                <option>Medium</option>
                <option>Large</option>
                <option>XL</option>
                <option>2XL</option>
                <option>3XL</option>
                <option>4XL</option>
            </select>

            <!-- PAYMENT -->
            <select class="form-control mb-2" id="paymentDone" required>
                <option value="">Payment Done?</option>
                <option>Yes</option>
                <option>No</option>
            </select>

              <select class="form-control mb-3" id="paymentModel" required>
                <option value="">Payment Model</option>
                <option>Bank</option>
                <option>Cash on arrival</option>
            </select>

            <!-- 🔥 PAYMENT PROOF (HIDDEN INITIALLY) >
            <div id="paymentProofBox" style="display:none;" class="mb-3">

                <label class="form-label">Upload Proof of Payment</label>

                <input 
                    type="file"
                    class="form-control"
                    id="paymentProof"
                    accept="image/*,.pdf"
                >

            </div-->

            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                Register
            </button>

        </form>

        <div id="result" class="mt-3"></div>

    </div>
</div>

<!-- SUCCESS MODAL -->
<div id="successModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:9999;">

  <div style="background:#fff;padding:20px;border-radius:12px;width:92%;max-width:450px;font-family:Arial;text-align:center;">

    <h2 style="color:green;">Registration Successful 🎉</h2>

    <hr>

    <p><b>Name:</b> <span id="s_name"></span></p>
    <p><b>Rank:</b> <span id="s_rank"></span></p>
    <p><b>Region:</b> <span id="s_region"></span></p>
    <p><b>Facility:</b> <span id="s_facility"></span></p>

    <hr>

    <p>
      <b>Registration Code:</b><br>
      <span id="successText"></span>
    </p>

    <img id="qrImage" style="width:170px;margin:10px 0;" />

    <br>

    <button onclick="downloadSlip()" class="btn btn-primary w-100 mb-2">
      Download Registration Slip
    </button>

    <button onclick="closeModal()" class="btn btn-secondary w-100">
      Close
    </button>

  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>

<script>
/* =========================
   DISTRICT LOADER
========================= */
const regionSelect = document.getElementById("region");
const districtSelect = document.getElementById("district");

let districtData = {};

fetch("districts.json")
.then(res => res.json())
.then(data => districtData = data)
.catch(err => console.log("District load error:", err));

regionSelect.addEventListener("change", function () {

    districtSelect.innerHTML = '<option value="">Select District</option>';

    if (!districtData[this.value]) return;

    districtData[this.value].forEach(d => {
        const option = document.createElement("option");
        option.value = d;
        option.textContent = d;
        districtSelect.appendChild(option);
    });

});

/* =========================
   PAYMENT PROOF TOGGLE
========================= */
document.getElementById("paymentDone").addEventListener("change", function () {

    const box = document.getElementById("paymentProofBox");
    const file = document.getElementById("paymentProof");

    if (this.value === "Yes") {
        box.style.display = "block";
        file.required = true;
    } else {
        box.style.display = "none";
        file.required = false;
        file.value = "";
    }

});

/* =========================
   GLOBAL ERROR DEBUG
========================= */
window.onerror = function(msg) {
    console.log("JS ERROR:", msg);
};
</script>

</body>
</html>
