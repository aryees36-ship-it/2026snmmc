<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SNMMC Badge Printing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.badge-card{
    width:350px;
    margin:auto;
    background:white;
    border:2px solid #006b3f;
    padding:20px;
    text-align:center;
    border-radius:10px;
}

.logo{
    width:80px;
}

.qr{
    width:120px;
    height:120px;
}

@media print{

    body *{
        visibility:hidden;
    }

    #badge,
    #badge *{
        visibility:visible;
    }

    #badge{
        position:absolute;
        left:0;
        top:0;
        width:100%;
    }

    .no-print{
        display:none;
    }
}

</style>

</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow no-print">

        <h3>Conference Badge Printing</h3>

        <input
            type="text"
            id="code"
            class="form-control mb-3"
            placeholder="Enter Registration Code">

        <button
            class="btn btn-success"
            onclick="loadBadge()">
            Generate Badge
        </button>

    </div>

    <br>

    <div id="badge" class="badge-card" style="display:none;">

        <!--img src="LOGO.png" class="logo">

        <h5 class="mt-2">
            Ghana Health Service
        </h5>

        <small>
            In Collaboration With GRNMA
        </small>

        <hr>

        <h6>
            Senior Nursing & Midwifery Managers Conference 2026
        </h6>

        <p>
            Pentecost Convention Centre
        </p-->

        <!--hr-->

        <h4 id="name"></h4>

        <p id="rank"></p>

        <p id="region"></p>

        <p id="facility"></p>

        <p>
            Code:
            <b id="regCode"></b>
        </p>

       <!----img id="qrImage" class="qr"-->

        <br><br>

        <button
            class="btn btn-primary no-print"
            onclick="window.print()">
            Print Badge
        </button>

    </div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxZ_USz_Uq-dYpV4dhhDW8MxjHox1yUz-j337O_3f-OsAiJ9d6i3Nn6S-Gpz6thxeyitQ/exec";

async function loadBadge(){

    const code = document.getElementById("code").value.trim();

    if(!code){
        alert("Enter Registration Code");
        return;
    }

    try{

        const response = await fetch(SCRIPT_URL + "?badge=" + code);
        const result = await response.json();

        console.log(result);

        if(result.found){

            document.getElementById("badge").style.display = "block";

            document.getElementById("name").innerText = result.name || "";
            document.getElementById("rank").innerText = result.rank || "";
            document.getElementById("region").innerText = result.region || "";
            document.getElementById("facility").innerText = result.facility || "";
            document.getElementById("regCode").innerText = result.regCode || "";

            if(document.getElementById("qrImage")){
                document.getElementById("qrImage").src = result.qr || "";
            }

        } else {
            alert("Participant not found");
        }

    } catch(err){
        console.log(err);
        alert("Unable to load badge");
    }
}

</script>

</body>
</html>
